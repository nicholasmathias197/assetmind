# =============================================================================
# buildspec-deploy.yml — Deployment Buildspec for AssetMind
# =============================================================================
# Condensed version of buildspec.yml without verbose comments.
# =============================================================================

version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
      nodejs: 20
    commands:
      - echo '========== INSTALLING DEPENDENCIES =========='
      - dnf install -y maven nodejs npm
      - dnf config-manager --add-repo https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo
      - dnf install -y terraform

  pre_build:
    commands:
      - echo '========== BUILDING SPRING BOOT JAR =========='
      - java -version
      - cd assetmind
      - mvn clean package -DskipTests
      - cd ..
      - echo '========== BUILDING REACT FRONTEND =========='
      - cd frontend
      - npm install
      - VITE_API_BASE_URL=http://$(aws ec2 describe-instances --instance-ids $(aws ec2 describe-instances --filters "Name=tag:Name,Values=assetmind-backend" "Name=instance-state-name,Values=running" --query "Reservations[0].Instances[0].InstanceId" --output text --region us-east-2) --query "Reservations[0].Instances[0].PublicIpAddress" --output text --region us-east-2):8080/api/v1 npm run build
      - cd ..

  build:
    commands:
      - echo '========== UPLOADING JAR TO S3 =========='
      - aws s3 cp assetmind/assetmind-application/target/assetmind-application-1.0.0.jar s3://assetmind-frontend-911784620581/app/assetmind-application.jar
      - echo '========== UPLOADING REACT BUILD TO S3 =========='
      - aws s3 sync frontend/dist s3://assetmind-frontend-911784620581 --delete --exclude "terraform/*" --exclude "app/*" --exclude "tfstate"
      - echo '========== TERRAFORM APPLY =========='
      - terraform init
      - terraform import -input=false aws_security_group.spring_boot_sg sg-PLACEHOLDER || true
      - terraform import -input=false aws_iam_role.ec2_role assetmind-ec2-role || true
      - terraform import -input=false aws_iam_instance_profile.ec2_profile assetmind-ec2-profile || true
      - terraform import -input=false aws_iam_role_policy_attachment.ec2_s3 assetmind-ec2-role/arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess || true
      - terraform import -input=false aws_iam_role_policy_attachment.ec2_ssm assetmind-ec2-role/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore || true
      - terraform import -input=false aws_s3_bucket.react_frontend assetmind-frontend-911784620581 || true
      - terraform import -input=false aws_s3_bucket_website_configuration.frontend assetmind-frontend-911784620581 || true
      - terraform import -input=false aws_s3_bucket_public_access_block.frontend assetmind-frontend-911784620581 || true
      - terraform import -input=false aws_s3_bucket_policy.frontend assetmind-frontend-911784620581 || true
      - CURRENT_INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=assetmind-backend" "Name=instance-state-name,Values=running" --query "Reservations[0].Instances[0].InstanceId" --output text --region us-east-2)
      - terraform import -input=false aws_instance.spring_boot_app $CURRENT_INSTANCE_ID || true
      - terraform apply -auto-approve -input=false
      - echo '========== WAITING FOR SSM AND RESTARTING SPRING BOOT =========='
      - chmod +x scripts/ssm-restart.sh
      - bash scripts/ssm-restart.sh || true

  post_build:
    commands:
      - echo '========== DEPLOY COMPLETE =========='
