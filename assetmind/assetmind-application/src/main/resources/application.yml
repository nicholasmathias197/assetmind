spring:
  application:
    name: assetmind-application
  datasource:
    url: ${ASSETMIND_DB_URL:jdbc:mysql://localhost:3306/assetmind}
    username: ${ASSETMIND_DB_USERNAME:root}
    password: ${ASSETMIND_DB_PASSWORD:Postgres1}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  cache:
    cache-names: classifications,taxStrategies
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s
  # ---------------------------------------------------------------
  # AI Classification (Groq free tier — OpenAI-compatible API)
  # Get a free key at https://console.groq.com
  # Set GROQ_API_KEY env var to enable; omit to use keyword fallback
  # ---------------------------------------------------------------
  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: ${AI_BASE_URL:https://api.groq.com/openai}
      chat:
        options:
          model: ${AI_MODEL:llama-3.3-70b-versatile}
          temperature: 0.1

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

jwt:
  secret: ${JWT_SECRET:assetmind-local-jwt-secret-for-hs512-development-only-change-this-before-production-2026}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:86400000}

assetmind:
  bootstrap-secret: ${BOOTSTRAP_SECRET:changeme-bootstrap-secret}
